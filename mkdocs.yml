site_name: BulletLab
site_url: https://nuclearvenom.github.io/BulletLab/
site_description: A fast, lightweight, research-oriented robotics experimentation workbench built on PyBullet
site_author: Ranasurya Ghosh

repo_url: https://github.com/NuclearVenom/BulletLab
repo_name: BulletLab

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - styles.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - API Reference:
    - Simulation: api/simulation.md
    - Robot: api/robot.md
    - Joint: api/joint.md
    - Link: api/link.md
    - TelemetryManager: api/telemetry.md
    - DataLogger: api/logging.md
    - LivePlot: api/plotting.md
    - BulletLabUI: api/ui.md
  - Guides:
    - Robot Guide: guides/robot_guide.md
    - UI Guide: guides/ui_guide.md
    - Telemetry Guide: guides/telemetry_guide.md
    - Plotting Guide: guides/plotting_guide.md
    - Examples Guide: guides/example_guide.md
    - RL Guide: guides/rl_guide.md
  - Developer:
    - Architecture: developer/architecture.md
    - Developer Guide: developer/developer_guide.md
